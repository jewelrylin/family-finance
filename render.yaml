services:
  - type: web
    name: familyfin-api
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATA_ENCRYPTION_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
