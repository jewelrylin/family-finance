services:
  - type: web
    name: family-finance-api
    runtime: node
    region: singapore
    plan: free

    buildCommand: cd server && npm install
    startCommand: cd server && node index.js

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        value: family-finance-secret-key-2026
