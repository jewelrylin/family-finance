[build]
  command = "cd client && npm install && npm run build"
  publish = "client/dist"
  functions = "server/netlify/functions"

[build.environment]
  CI = "false"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
