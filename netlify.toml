[build]
  command = "cd client && npm install && npm run build"
  publish = "client/dist"

[build.environment]
  CI = "false"

[[redirects]]
  from = "/api/*"
  to = "https://family-finance-api.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
