name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build client
        run: |
          cd client && npm ci && npm run build

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: 865c3e67-a061-4f50-9c1e-02c5103ec42b
        run: |
          npx netlify-cli deploy --prod --dir=client/dist --message "Deploy ${{ github.sha }}"
