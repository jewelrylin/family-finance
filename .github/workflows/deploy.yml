name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: 865c3e67-a061-4f50-9c1e-02c5103ec42b
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate deployment secrets
        run: |
          test -n "$NETLIFY_AUTH_TOKEN" || (echo "Missing NETLIFY_AUTH_TOKEN" && exit 1)
          test -n "$RENDER_DEPLOY_HOOK_URL" || (echo "Missing RENDER_DEPLOY_HOOK_URL" && exit 1)
          test -n "$SUPABASE_DB_URL" || (echo "Missing SUPABASE_DB_URL" && exit 1)

      - name: Install & Build client
        run: |
          cd client && npm ci && npm run build

      - name: Check server syntax
        run: |
          npm ci --prefix server
          node --check server/index.js
          node --check server/routes/auth.js
          node --check server/routes/families.js
          node --check server/routes/transactions.js
          node --check server/routes/analysis.js

      - uses: supabase/setup-cli@v2
        with:
          version: 2.101.0

      - name: Apply Supabase migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL" --yes

      - name: Deploy to Netlify
        run: |
          npx netlify-cli deploy --prod --dir=client/dist --message "Deploy ${{ github.sha }}"

      - name: Trigger Render deploy
        run: |
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
